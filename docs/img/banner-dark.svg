<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="25%" stop-color="#FFC107"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="75%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8F00" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FFC107" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#FFC107" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bolt-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg-grad)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- Aurora glow behind the gradient line -->
  <ellipse cx="640" cy="52" rx="600" ry="40" fill="url(#glow)"/>

  <!-- Gradient line -->
  <rect x="80" y="48" width="1120" height="3" rx="1.5" fill="url(#aurora)"/>

  <!-- Lightning bolt icon (decorative, right side) -->
  <g transform="translate(1140, 165) scale(0.85)" opacity="0.12">
    <path
      d="M 20 -80
         L -20 10
         L 16 10
         L 4 100
         L 44 -2
         L 8 -2
         Z"
      fill="url(#bolt-gradient)"
    />
  </g>

  <!-- Title -->
  <text x="80" y="150" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, Monaco, 'Courier New', monospace" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">
    create-voltrn-boilerplate
  </text>

  <!-- Subtitle -->
  <text x="80" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#FFC107" font-style="italic">
    React Native &amp; Expo CLI Boilerplate
  </text>

  <!-- Description -->
  <text x="80" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#6b7280">
    Scaffold production-ready projects with navigation, auth, i18n, and theming
  </text>

  <!-- Bottom accent dots -->
  <circle cx="80" cy="275" r="3" fill="#FF8F00" opacity="0.6"/>
  <circle cx="95" cy="275" r="3" fill="#F97316" opacity="0.6"/>
  <circle cx="110" cy="275" r="3" fill="#FFC107" opacity="0.6"/>
  <circle cx="125" cy="275" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="140" cy="275" r="3" fill="#FFC107" opacity="0.6"/>
</svg>
